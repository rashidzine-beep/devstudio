<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impact Way — Production Queue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ed;
    --bg-card: #fdfcf8;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-muted: #8a8680;
    --line: #e5e1d6;
    --accent: #c2410c;
    --accent-soft: #f5d0b5;
    --linkedin: #0a66c2;
    --linkedin-soft: #c8e1f5;
    --approved: #166534;
    --approved-soft: #c4e8ce;
    --success: #166534;
    --fail: #991b1b;
    --shadow: 0 1px 2px rgba(26,26,26,0.04), 0 8px 24px rgba(26,26,26,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Fraunces', 'Georgia', serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 17px;
    line-height: 1.55;
    min-height: 100vh;
    padding: 48px 24px 120px;
    -webkit-font-smoothing: antialiased;
  }

  .shell { max-width: 920px; margin: 0 auto; }

  header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 28px;
    margin-bottom: 28px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 16px;
  }

  .brand { font-family: 'Fraunces', serif; font-weight: 300; font-size: 34px; letter-spacing: -0.02em; line-height: 1; }
  .brand em { font-style: italic; font-weight: 400; color: var(--accent); }
  .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-muted); }

  /* ROW 1: queue tabs */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--line);
    margin-bottom: 20px;
  }
  .tab {
    background: transparent;
    border: none;
    padding: 14px 22px;
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--ink-muted);
    cursor: pointer;
    margin-bottom: -2px;
    border-bottom: 2px solid transparent;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: color 0.15s ease;
  }
  .tab:hover { color: var(--ink-soft); }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); }
  .tab.active.linkedin { border-bottom-color: var(--linkedin); }
  .tab .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    background: var(--line);
    color: var(--ink-soft);
    padding: 2px 8px;
    border-radius: 999px;
    min-width: 24px;
    text-align: center;
  }
  .tab.active .count { background: var(--accent); color: var(--bg-card); }
  .tab.active.linkedin .count { background: var(--linkedin); }

  /* ROW 2: view tabs (queue / approved) — sub-navigation */
  .view-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  .view-tab {
    background: transparent;
    border: 1px solid var(--line);
    padding: 8px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .view-tab:hover { border-color: var(--ink-soft); color: var(--ink); }
  .view-tab.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .view-tab .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--ink-muted);
  }
  .view-tab.active .dot { background: var(--bg); }

  /* ROW 3: search + filter */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .search-input {
    flex: 1;
    min-width: 200px;
    padding: 10px 14px 10px 36px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--bg-card) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%238a8680" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>') no-repeat 12px center;
    background-size: 16px;
    font-family: 'Fraunces', serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease;
  }
  .search-input:focus { border-color: var(--accent); }
  .filter-select {
    padding: 10px 14px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--bg-card);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    cursor: pointer;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-soft);
    padding: 9px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s ease;
  }
  .refresh-btn:hover { border-color: var(--ink); color: var(--ink); }

  .meta-bar {
    display: flex;
    gap: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .meta-bar strong { color: var(--ink); font-weight: 500; }

  .empty-state, .loading-state, .error-state {
    padding: 80px 24px;
    text-align: center;
    font-style: italic;
    color: var(--ink-muted);
    font-size: 19px;
  }
  .error-state { color: var(--fail); font-style: normal; font-family: 'JetBrains Mono', monospace; font-size: 14px; }

  .script-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 22px 26px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    transition: border-color 0.2s ease;
  }
  .script-card:hover { border-color: var(--ink-soft); }
  .script-card.selected { border-color: var(--accent); background: #fdf6f0; }
  .script-card.selected.linkedin { border-color: var(--linkedin); background: #f0f7fc; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 12px;
  }

  .card-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
    flex-wrap: wrap;
  }
  .id-tag { background: var(--line); padding: 3px 8px; border-radius: 2px; color: var(--ink-soft); }
  .status-tag { padding: 3px 8px; border-radius: 2px; font-weight: 500; }
  .status-tag.draft       { background: var(--line); color: var(--ink-soft); }
  .status-tag.approved    { background: var(--accent-soft); color: var(--accent); }
  .status-tag.generating  { background: #fef3c7; color: #92400e; }
  .status-tag.done        { background: var(--approved-soft); color: var(--approved); }

  .checkbox-wrap { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; flex-shrink: 0; }
  .checkbox-wrap.disabled { opacity: 0.4; cursor: not-allowed; }
  .checkbox-wrap input[type="checkbox"] {
    appearance: none;
    width: 22px; height: 22px;
    border: 1.5px solid var(--ink-soft);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    background: transparent;
    transition: all 0.15s ease;
  }
  .checkbox-wrap input[type="checkbox"]:hover { border-color: var(--accent); }
  .checkbox-wrap input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
  .linkedin-tab .checkbox-wrap input[type="checkbox"]:checked { background: var(--linkedin); border-color: var(--linkedin); }
  .checkbox-wrap input[type="checkbox"]:checked::after {
    content: "✓"; position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: white; font-size: 14px; font-weight: 700;
  }
  .label-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-soft); }

  .script-title { font-size: 22px; font-weight: 400; letter-spacing: -0.01em; line-height: 1.3; margin-bottom: 10px; }
  .hook-block { border-left: 2px solid var(--accent); padding: 4px 0 4px 16px; margin: 12px 0; font-style: italic; font-size: 17px; line-height: 1.5; }
  .linkedin-tab .hook-block { border-left-color: var(--linkedin); }
  .approved-view .hook-block { border-left-color: var(--approved); }
  .hook-label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-muted); font-style: normal; margin-bottom: 4px; }
  .body-preview { color: var(--ink-soft); font-size: 15px; line-height: 1.6; margin-bottom: 12px; }
  .toggle-full { background: none; border: none; color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; padding: 0; font-weight: 500; }
  .linkedin-tab .toggle-full { color: var(--linkedin); }
  .toggle-full:hover { text-decoration: underline; }
  .full-detail { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--line); }
  .full-detail.show { display: block; }
  .field-row { display: grid; grid-template-columns: 130px 1fr; gap: 18px; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .field-row:last-child { border-bottom: none; }
  .field-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-muted); padding-top: 2px; }
  .field-value { color: var(--ink-soft); line-height: 1.55; }
  .field-value pre { font-family: 'Fraunces', serif; font-size: 14px; white-space: pre-wrap; color: var(--ink-soft); line-height: 1.6; }
  .field-value a { color: var(--accent); text-decoration: none; }
  .field-value a:hover { text-decoration: underline; }
  .colour-swatch { display: inline-block; width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--line); vertical-align: middle; margin-right: 8px; }

  .asset-link {
    display: inline-block;
    padding: 6px 12px;
    background: var(--ink);
    color: var(--bg);
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 2px;
    margin-right: 6px;
    margin-top: 6px;
  }
  .asset-link:hover { background: var(--accent); }
  .linkedin-tab .asset-link:hover { background: var(--linkedin); }

  .action-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg-card);
    border-top: 1px solid var(--line);
    padding: 16px 24px;
    box-shadow: 0 -4px 20px rgba(26,26,26,0.06);
    z-index: 10;
    transition: transform 0.25s ease;
  }
  .action-bar.hidden { transform: translateY(120%); }
  .action-inner { max-width: 920px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
  .selection-count { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--ink-soft); }
  .selection-count strong { color: var(--accent); font-weight: 500; }
  .linkedin-tab .selection-count strong { color: var(--linkedin); }
  .approve-btn {
    background: var(--ink); color: var(--bg);
    border: none; padding: 14px 32px;
    font-family: 'Fraunces', serif; font-size: 16px;
    border-radius: 2px; cursor: pointer;
    transition: all 0.15s ease;
  }
  .approve-btn:hover:not(:disabled) { background: var(--accent); }
  .linkedin-tab .approve-btn:hover:not(:disabled) { background: var(--linkedin); }
  .approve-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .toast {
    position: fixed; bottom: 100px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--bg);
    padding: 14px 24px; border-radius: 2px;
    font-size: 14px; opacity: 0;
    transition: all 0.3s ease;
    z-index: 20; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--fail); }
  .toast.success { background: var(--success); }

  .script-card { animation: fadeUp 0.3s ease forwards; opacity: 0; }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(8px); } }

  @media (max-width: 640px) {
    body { padding: 28px 14px 130px; font-size: 16px; }
    .brand { font-size: 26px; }
    .tab { padding: 12px 14px; font-size: 16px; }
    .script-card { padding: 18px; }
    .card-top { flex-direction: column; gap: 12px; }
    .script-title { font-size: 19px; }
    .field-row { grid-template-columns: 1fr; gap: 4px; }
    .action-inner { flex-direction: column; gap: 12px; }
  }
</style>
</head>
<body>

<div class="shell">
  <header>
    <div>
      <div class="brand">Impact <em>Way</em></div>
      <div class="subtitle" style="margin-top:4px">Production Queue</div>
    </div>
    <button class="refresh-btn" onclick="loadAll()">Refresh</button>
  </header>

  <!-- Queue tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-reels" onclick="switchQueue('reels')">
      <span>🎬 Reels</span>
      <span class="count" id="count-reels">—</span>
    </button>
    <button class="tab linkedin" id="tab-linkedin" onclick="switchQueue('linkedin')">
      <span>💼 LinkedIn</span>
      <span class="count" id="count-linkedin">—</span>
    </button>
  </div>

  <!-- View tabs (Queue / Approved) -->
  <div class="view-tabs">
    <button class="view-tab active" id="view-draft" onclick="switchView('draft')">
      <span class="dot"></span>
      <span>Queue</span>
    </button>
    <button class="view-tab" id="view-approved" onclick="switchView('approved')">
      <span class="dot"></span>
      <span>Approved &amp; Done</span>
    </button>
  </div>

  <!-- Search + filter -->
  <div class="controls">
    <input type="text" class="search-input" id="search-input" placeholder="Search by ID, hook, headline…" oninput="onSearchChange()">
    <select class="filter-select" id="filter-status" onchange="renderCurrent()">
      <option value="all">All statuses</option>
      <option value="Draft">Draft only</option>
      <option value="Approved">Approved only</option>
      <option value="Generating">Generating</option>
      <option value="Done">Done</option>
    </select>
  </div>

  <div class="meta-bar">
    <span><strong id="visible-count">—</strong> visible</span>
    <span><strong id="last-updated">—</strong></span>
  </div>

  <div id="container">
    <div class="loading-state">Loading…</div>
  </div>
</div>

<div class="action-bar" id="action-bar">
  <div class="action-inner">
    <span class="selection-count"><strong id="selected-count">0</strong> selected</span>
    <button class="approve-btn" id="approve-btn" disabled onclick="approveSelected()">Approve Selected</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwb28xLUlhnzo3-hJpDaYYXEm4281tA1YIIMmOvYDxTFKk3CxMDriLuneJZU3aq7_dX/exec';

  let currentQueue = 'reels';
  let currentView = 'draft';
  let queueData = {
    reels:    { draft: [], approved: [] },
    linkedin: { draft: [], approved: [] }
  };
  let selected = { reels: new Set(), linkedin: new Set() };
  let searchTerm = '';

  function showToast(msg, type='default') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function switchQueue(queue) {
    currentQueue = queue;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + queue).classList.add('active');
    document.body.classList.toggle('linkedin-tab', queue === 'linkedin');
    renderCurrent();
  }

  function switchView(view) {
    currentView = view;
    document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('view-' + view).classList.add('active');
    document.body.classList.toggle('approved-view', view === 'approved');
    document.getElementById('action-bar').classList.toggle('hidden', view === 'approved');
    renderCurrent();
  }

  function onSearchChange() {
    searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
    renderCurrent();
  }

  async function loadAll() {
    const container = document.getElementById('container');
    container.innerHTML = '<div class="loading-state">Loading…</div>';

    if (APPS_SCRIPT_URL.indexOf('PASTE_YOUR') === 0) {
      container.innerHTML = '<div class="error-state">Dashboard URL not configured.</div>';
      return;
    }

    const queues = ['reels', 'linkedin'];
    const views = ['draft', 'approved'];
    const promises = [];
    queues.forEach(q => views.forEach(v => promises.push(loadOne(q, v))));

    try {
      await Promise.all(promises);
      // Reset selections after fresh load
      selected.reels.clear();
      selected.linkedin.clear();
      renderCurrent();
      updateMeta();
    } catch (err) {
      container.innerHTML = '<div class="error-state">Failed to load.<br>' + err.message + '</div>';
      showToast('Load failed: ' + err.message, 'error');
    }
  }

  async function loadOne(queue, view) {
    const url = APPS_SCRIPT_URL + '?action=list&queue=' + queue + '&view=' + view;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    queueData[queue][view] = data.scripts || [];

    // Update queue counts (use draft view as the canonical "active" count)
    if (view === 'draft') {
      document.getElementById('count-' + queue).textContent = (queueData[queue].draft || []).length;
    }
  }

  function applyFilters(items) {
    const statusFilter = document.getElementById('filter-status').value;
    return items.filter(item => {
      if (statusFilter !== 'all' && item.status !== statusFilter) return false;
      if (searchTerm) {
        const haystack = [
          item.id, item.title, item.hook, item.body,
          item.headline, item.subject, item.postBody
        ].join(' ').toLowerCase();
        if (haystack.indexOf(searchTerm) === -1) return false;
      }
      return true;
    });
  }

  function renderCurrent() {
    const container = document.getElementById('container');
    const items = applyFilters(queueData[currentQueue][currentView] || []);
    document.getElementById('visible-count').textContent = items.length;

    if (items.length === 0) {
      let msg;
      if (searchTerm) {
        msg = 'No results match "' + escapeHtml(searchTerm) + '".';
      } else if (currentView === 'approved') {
        msg = currentQueue === 'reels'
          ? 'Nothing approved yet. Pick some Reels from the Queue tab.'
          : 'Nothing approved yet. Pick some LinkedIn posts from the Queue tab.';
      } else {
        msg = currentQueue === 'reels'
          ? 'No Reels in the queue.<br>Send Claude a YouTube URL or topic to fill this list.'
          : 'No LinkedIn posts in the queue.<br>Ask Claude for a LinkedIn version of any Reel.';
      }
      container.innerHTML = '<div class="empty-state">' + msg + '</div>';
      updateActionBar();
      return;
    }

    container.innerHTML = '';
    items.forEach((item, i) => {
      const card = currentQueue === 'reels' ? renderReelCard(item, i) : renderLinkedInCard(item, i);
      container.appendChild(card);
    });
    updateActionBar();
  }

  function statusTagHtml(status) {
    const s = (status || '').toLowerCase();
    return '<span class="status-tag ' + escapeHtml(s) + '">' + escapeHtml(status || 'Draft') + '</span>';
  }

  function checkboxHtml(item) {
    if (currentView === 'approved' || item.status !== 'Draft') {
      return ''; // no checkbox in approved view or for non-draft items
    }
    return `
      <label class="checkbox-wrap">
        <input type="checkbox" data-id="${escapeHtml(item.id)}">
        <span class="label-text">Approve</span>
      </label>
    `;
  }

  function renderReelCard(item, i) {
    const card = document.createElement('article');
    card.className = 'script-card';
    card.style.animationDelay = (i * 25) + 'ms';
    const wordCount = (item.body || '').split(/\s+/).filter(Boolean).length;
    const sec = Math.round(wordCount / 2.5);

    let assets = '';
    if (item.thumbnailUrl) {
      assets += '<a href="' + escapeHtml(item.thumbnailUrl) + '" target="_blank" class="asset-link">🖼️ Thumbnail</a>';
    }

    card.innerHTML = `
      <div class="card-top">
        <div class="card-meta">
          <span class="id-tag">${escapeHtml(item.id)}</span>
          <span>${wordCount}w · ~${sec}s</span>
          ${statusTagHtml(item.status)}
        </div>
        ${checkboxHtml(item)}
      </div>
      <h2 class="script-title">${escapeHtml(item.title || 'Untitled')}</h2>
      <div class="hook-block">
        <span class="hook-label">Hook</span>
        ${escapeHtml(item.hook || '—')}
      </div>
      <div class="body-preview">${escapeHtml(truncate(item.body || '', 180))}</div>
      ${assets ? '<div style="margin-bottom:10px">' + assets + '</div>' : ''}
      <button class="toggle-full" onclick="toggleDetail('${item.id}')">View full →</button>
      <div class="full-detail" id="detail-${item.id}">
        <div class="field-row"><div class="field-label">Full Body</div><div class="field-value"><pre>${escapeHtml(item.body || '')}</pre></div></div>
        <div class="field-row"><div class="field-label">Thumbnail</div><div class="field-value">${escapeHtml(item.thumbSubject || '—')}</div></div>
        <div class="field-row"><div class="field-label">Source</div><div class="field-value">${item.sourceUrl ? '<a href="' + escapeHtml(item.sourceUrl) + '" target="_blank">Open</a>' : '—'}</div></div>
        <div class="field-row"><div class="field-label">LinkedIn version</div><div class="field-value">${item.generateLi === 'TRUE' ? 'Yes' : 'No'}</div></div>
        ${item.generatedAt ? '<div class="field-row"><div class="field-label">Generated</div><div class="field-value">' + escapeHtml(item.generatedAt) + '</div></div>' : ''}
      </div>
    `;
    attachCheckbox(card, item.id);
    return card;
  }

  function renderLinkedInCard(item, i) {
    const card = document.createElement('article');
    card.className = 'script-card';
    card.style.animationDelay = (i * 25) + 'ms';
    const charCount = (item.postBody || '').length;
    const accent = item.accent || '';

    let assets = '';
    if (item.posterUrl) {
      assets += '<a href="' + escapeHtml(item.posterUrl) + '" target="_blank" class="asset-link">💼 Poster</a>';
    }

    card.innerHTML = `
      <div class="card-top">
        <div class="card-meta">
          <span class="id-tag">${escapeHtml(item.id)}</span>
          <span>${charCount} chars</span>
          ${statusTagHtml(item.status)}
        </div>
        ${checkboxHtml(item)}
      </div>
      <h2 class="script-title">${escapeHtml(item.headline || 'Untitled')}</h2>
      <div class="hook-block">
        <span class="hook-label">Body preview</span>
        ${escapeHtml(truncate(item.postBody || '', 200))}
      </div>
      ${assets ? '<div style="margin-bottom:10px">' + assets + '</div>' : ''}
      <button class="toggle-full" onclick="toggleDetail('${item.id}')">View full →</button>
      <div class="full-detail" id="detail-${item.id}">
        <div class="field-row"><div class="field-label">Full Post</div><div class="field-value"><pre>${escapeHtml(item.postBody || '')}</pre></div></div>
        <div class="field-row"><div class="field-label">Headline</div><div class="field-value">${escapeHtml(item.headline || '—')}</div></div>
        <div class="field-row"><div class="field-label">Subject</div><div class="field-value">${escapeHtml(item.subject || '—')}</div></div>
        <div class="field-row"><div class="field-label">Accent</div><div class="field-value">${accent ? '<span class="colour-swatch" style="background:' + escapeHtml(accent) + '"></span>' : ''}${escapeHtml(accent || '—')}</div></div>
        ${item.generatedAt ? '<div class="field-row"><div class="field-label">Generated</div><div class="field-value">' + escapeHtml(item.generatedAt) + '</div></div>' : ''}
      </div>
    `;
    attachCheckbox(card, item.id);
    return card;
  }

  function attachCheckbox(card, id) {
    const cb = card.querySelector('input[type="checkbox"]');
    if (!cb) return;
    cb.addEventListener('change', e => {
      const itemId = e.target.dataset.id;
      if (e.target.checked) {
        selected[currentQueue].add(itemId);
        card.classList.add('selected');
        if (currentQueue === 'linkedin') card.classList.add('linkedin');
      } else {
        selected[currentQueue].delete(itemId);
        card.classList.remove('selected', 'linkedin');
      }
      updateActionBar();
    });
  }

  function toggleDetail(id) {
    const d = document.getElementById('detail-' + id);
    if (d) d.classList.toggle('show');
  }

  function updateMeta() {
    const now = new Date();
    document.getElementById('last-updated').textContent =
      'updated ' + now.toLocaleString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
  }

  function updateActionBar() {
    if (currentView === 'approved') {
      document.getElementById('action-bar').classList.add('hidden');
      return;
    }
    document.getElementById('action-bar').classList.remove('hidden');
    const count = selected[currentQueue].size;
    document.getElementById('selected-count').textContent = count;
    document.getElementById('approve-btn').disabled = count === 0;
  }

  async function approveSelected() {
    const ids = Array.from(selected[currentQueue]);
    if (ids.length === 0) return;
    const btn = document.getElementById('approve-btn');
    btn.disabled = true;
    btn.textContent = 'Approving…';

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'approve', queue: currentQueue, ids })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      showToast(`${ids.length} ${ids.length === 1 ? 'item' : 'items'} sent to production`, 'success');
      setTimeout(loadAll, 600);
    } catch (err) {
      showToast('Approval failed: ' + err.message, 'error');
      btn.disabled = false;
    } finally {
      btn.textContent = 'Approve Selected';
    }
  }

  function escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }
  function truncate(s, n) { return s.length <= n ? s : s.substring(0, n).trim() + '…'; }

  loadAll();
</script>

</body>
</html>
